name: Export NotebookLM Knowledge Base

on:
  workflow_dispatch:   # manual trigger only

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: claude/automated-outreach-system-FqALG
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install NotebookLM dependencies
        run: |
          python -m pip install "notebooklm-py[browser]"
          python -m playwright install chromium --with-deps

      - name: Query notebook and write knowledge base
        env:
          NOTEBOOKLM_STORAGE_STATE: ${{ secrets.NOTEBOOKLM_STORAGE_STATE }}
        run: python scripts/export_notebook_knowledge.py

      - name: Commit and push knowledge base
        run: |
          git config user.name "NINE Knowledge Bot"
          git config user.email "knowledge-bot@nine.agency"
          # Stash the generated file, sync to latest remote, restore
          cp knowledge/nine-brand-knowledge.md /tmp/nine-brand-knowledge.md
          git fetch origin claude/automated-outreach-system-FqALG
          git reset --hard origin/claude/automated-outreach-system-FqALG
          mkdir -p knowledge
          cp /tmp/nine-brand-knowledge.md knowledge/nine-brand-knowledge.md
          git add knowledge/nine-brand-knowledge.md
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Knowledge base: refreshed from NotebookLM"
          git push origin HEAD:claude/automated-outreach-system-FqALG
